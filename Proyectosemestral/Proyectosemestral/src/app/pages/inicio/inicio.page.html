<app-header title="Inicio"></app-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Finanzas Personales</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <p>Registra tus ingresos y gastos, y consulta reportes simples.</p>
      <ion-grid class="ion-margin-top">
        <ion-row>
          <ion-col size="12" sizeMd="6">
            <ion-button expand="block" routerLink="/tabs/movimientos">
              Ir a Movimientos
            </ion-button>
          </ion-col>
          <ion-col size="12" sizeMd="6">
            <ion-button expand="block" fill="outline" routerLink="/tabs/reportes">
              Ir a Reportes
            </ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
  </ion-card>
</ion-content>
